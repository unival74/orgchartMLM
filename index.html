<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>バイナリーシステム組織図管理</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f5f5f5; padding: 10px; }
        .container { max-width: 100%; margin: auto; background: #fff; border-radius: 8px; box-shadow: 0 2px 10px rgba(0,0,0,.1); padding: 20px; }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        .login-screen { min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        .login-form { width: 100%; max-width: 300px; padding: 30px; background: #fff; border-radius: 8px; box-shadow: 0 2px 15px rgba(0,0,0,.1); }
        .login-form h1 { font-size: 24px; margin-bottom: 20px; text-align: center; color: #333; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 500; color: #555; font-size: 14px; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; font-size: 14px; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: #fff; border: none; border-radius: 4px; font-size: 14px; cursor: pointer; font-weight: 600; margin-top: 10px; }
        button:hover { background: #45a049; }
        .error { color: #d32f2f; font-size: 12px; margin-top: 10px; }
        .success { color: #4CAF50; font-size: 12px; margin-top: 10px; }
        .toggle-link { text-align: center; margin-top: 15px; font-size: 12px; }
        .toggle-link a { color: #2196F3; cursor: pointer; text-decoration: underline; }
        
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #ddd; flex-wrap: wrap; gap: 10px; }
        .header h1 { color: #333; font-size: 20px; flex: 1; }
        .user-info { font-size: 12px; color: #666; }
        .button-group-header { display: flex; gap: 10px; flex-wrap: wrap; }
        .button-group-header button { padding: 8px 12px; font-size: 12px; }
        
        .org-tree { overflow-x: auto; padding: 20px 0; }
        .tree-node { display: flex; flex-direction: column; align-items: center; margin-bottom: 30px; }
        .node-box { background: #e3f2fd; border: 2px solid #2196F3; border-radius: 6px; padding: 12px 15px; min-width: 140px; text-align: center; transition: all .3s; }
        .node-box:hover { background: #bbdefb; box-shadow: 0 4px 12px rgba(33,150,243,.3); }
        .node-box h3 { font-size: 14px; color: #1976D2; margin-bottom: 3px; }
        .node-box p { font-size: 11px; color: #666; }
        .node-box .user-id { font-size: 10px; color: #999; }
        .node-children { display: flex; gap: 20px; margin-top: 20px; justify-content: center; flex-wrap: wrap; }
        .child-label { font-size: 10px; color: #999; font-weight: 500; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,.5); justify-content: center; align-items: center; z-index: 1000; }
        .modal.active { display: flex; }
        .modal-content { background: #fff; padding: 25px; border-radius: 8px; max-width: 400px; width: 90%; max-height: 80vh; overflow-y: auto; }
        .modal-content h2 { margin-bottom: 20px; font-size: 18px; color: #333; }
        .modal-content .form-group { margin-bottom: 15px; }
        .modal-content button { margin-top: 15px; }
        .modal-close { text-align: right; cursor: pointer; color: #999; font-size: 20px; margin-bottom: 10px; }
        
        @media (max-width: 768px) {
            .container { padding: 10px; }
            .login-form { max-width: 100%; }
            .header { flex-direction: column; align-items: flex-start; }
            .button-group-header { width: 100%; }
            .button-group-header button { flex: 1; }
            .node-box { min-width: 110px; padding: 10px 12px; font-size: 12px; }
            .node-box h3 { font-size: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="screen login-screen active" id="loginScreen">
            <div class="login-form">
                <h1>組織図管理</h1>
                
                <div id="loginTab">
                    <div class="form-group">
                        <label for="loginUsername">ユーザー名</label>
                        <input type="text" id="loginUsername" placeholder="ユーザー名" value="admin1">
                    </div>
                    <div class="form-group">
                        <label for="loginPassword">パスワード</label>
                        <input type="password" id="loginPassword" placeholder="パスワード" value="pass123">
                    </div>
                    <button onclick="login()">ログイン</button>
                    <div class="error" id="loginError"></div>
                    <div class="toggle-link">
                        新規ユーザーは <a onclick="toggleRegisterTab()">こちら</a>
                    </div>
                </div>
                
                <div id="registerTab" style="display: none;">
                    <div class="form-group">
                        <label for="regUsername">ユーザー名</label>
                        <input type="text" id="regUsername" placeholder="ユーザー名">
                    </div>
                    <div class="form-group">
                        <label for="regPassword">パスワード</label>
                        <input type="password" id="regPassword" placeholder="パスワード">
                    </div>
                    <div class="form-group">
                        <label for="regBoss">上司を選択</label>
                        <select id="regBoss">
                            <option value="">-- 上司を選択してください --</option>
                        </select>
                    </div>
                    <button onclick="registerUser()">登録</button>
                    <div class="error" id="registerError"></div>
                    <div class="success" id="registerSuccess"></div>
                    <div class="toggle-link">
                        ログインは <a onclick="toggleRegisterTab()">こちら</a>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="screen" id="orgChartScreen">
            <div class="header">
                <div>
                    <h1>組織図</h1>
                    <p class="user-info" id="userInfo"></p>
                </div>
                <div class="button-group-header" id="adminButtons" style="display: none;">
                    <button onclick="openAddModal()">メンバー追加</button>
                    <button onclick="openExportModal()">エクスポート</button>
                    <button onclick="openImportModal()">インポート</button>
                    <button class="logout-btn" onclick="logout()" style="background: #f44336;">ログアウト</button>
                </div>
                <button class="logout-btn" id="userLogoutBtn" onclick="logout()" style="background: #f44336; display: none;">ログアウト</button>
            </div>
            <div class="org-tree" id="orgTree"></div>
        </div>
    </div>
    
    <div class="modal" id="addMemberModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeAddModal()">✕</div>
            <h2>メンバーを追加</h2>
            <div class="form-group">
                <label for="newMemberName">名前</label>
                <input type="text" id="newMemberName" placeholder="名前を入力">
            </div>
            <div class="form-group">
                <label for="newMemberBoss">上司を選択</label>
                <select id="newMemberBoss">
                    <option value="">-- 上司を選択してください --</option>
                </select>
            </div>
            <button onclick="addMember()">追加</button>
            <div class="error" id="addMemberError"></div>
        </div>
    </div>
    
    <div class="modal" id="exportModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeExportModal()">✕</div>
            <h2>データをエクスポート</h2>
            <p>以下のボタンをクリックして CSV をダウンロードしてください。</p>
            <button onclick="exportOrgData()">組織図データをエクスポート</button>
            <button onclick="exportUserData()">ユーザーデータをエクスポート</button>
        </div>
    </div>
    
    <div class="modal" id="importModal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeImportModal()">✕</div>
            <h2>データをインポート</h2>
            <div class="form-group">
                <label for="importFile">CSV ファイルを選択</label>
                <input type="file" id="importFile" accept=".csv">
            </div>
            <button onclick="importData()">インポート</button>
            <div class="error" id="importError"></div>
            <div class="success" id="importSuccess"></div>
        </div>
    </div>

    <script>
        let currentUser = null;
        let userData = [];
        let orgData = [];
        let registrationData = [];
        
        // 初期データ
        const defaultData = {
            users: [
                { 'ユーザー名': 'admin1', 'パスワード': 'pass123', '権限': 'admin', '組織ID': '1' },
                { 'ユーザー名': 'user1', 'パスワード': 'pass456', '権限': 'general', '組織ID': '2' }
            ],
            org: [
                { 'ID': '1', '名前': '山田太郎', '上司ID': '0' },
                { 'ID': '2', '名前': '佐藤花子', '上司ID': '1' },
                { 'ID': '3', '名前': '鈴木次郎', '上司ID': '1' },
                { 'ID': '4', '名前': '田中美咲', '上司ID': '2' }
            ],
            registration: []
        };
        
        window.addEventListener('load', () => {
            initApp();
        });
        
        function initApp() {
            const stored = localStorage.getItem('orgChartData');
            if (stored) {
                try {
                    const data = JSON.parse(stored);
                    userData = data.users || defaultData.users;
                    orgData = data.org || defaultData.org;
                    registrationData = data.registration || defaultData.registration;
                } catch (e) {
                    userData = defaultData.users;
                    orgData = defaultData.org;
                    registrationData = defaultData.registration;
                }
            } else {
                userData = defaultData.users;
                orgData = defaultData.org;
                registrationData = defaultData.registration;
                saveData();
            }
            populateBossDropdown();
        }
        
        function saveData() {
            localStorage.setItem('orgChartData', JSON.stringify({
                users: userData,
                org: orgData,
                registration: registrationData
            }));
        }
        
        function populateBossDropdown() {
            const bosses = orgData.map(o => ({ id: o['ID'], name: o['名前'] }));
            const options = bosses.map(b => `<option value="${b.id}">${b.name} (ID: ${b.id})</option>`).join('');
            document.getElementById('regBoss').innerHTML = '<option value="">-- 上司を選択してください --</option>' + options;
            document.getElementById('newMemberBoss').innerHTML = '<option value="">-- 上司を選択してください --</option>' + options;
        }
        
        function toggleRegisterTab() {
            document.getElementById('loginTab').style.display = document.getElementById('loginTab').style.display === 'none' ? 'block' : 'none';
            document.getElementById('registerTab').style.display = document.getElementById('registerTab').style.display === 'none' ? 'block' : 'none';
            document.getElementById('loginError').textContent = '';
            document.getElementById('registerError').textContent = '';
            document.getElementById('registerSuccess').textContent = '';
        }
        
        function login() {
            const u = document.getElementById('loginUsername').value.trim();
            const p = document.getElementById('loginPassword').value.trim();
            const err = document.getElementById('loginError');
            
            if (!u || !p) {
                err.textContent = 'ユーザー名とパスワードを入力してください';
                return;
            }
            
            let user = userData.find(x => x['ユーザー名'] === u && x['パスワード'] === p);
            
            if (!user) {
                user = registrationData.find(x => x['ユーザー名'] === u && x['パスワード'] === p);
            }
            
            if (user) {
                currentUser = user;
                err.textContent = '';
                showOrgChart();
            } else {
                err.textContent = 'ユーザー名またはパスワードが正しくありません';
            }
        }
        
        function registerUser() {
            const u = document.getElementById('regUsername').value.trim();
            const p = document.getElementById('regPassword').value.trim();
            const bossId = document.getElementById('regBoss').value;
            const err = document.getElementById('registerError');
            const suc = document.getElementById('registerSuccess');
            
            err.textContent = '';
            suc.textContent = '';
            
            if (!u || !p || !bossId) {
                err.textContent = '全てのフィールドを入力してください';
                return;
            }
            
            if (userData.find(x => x['ユーザー名'] === u) || registrationData.find(x => x['ユーザー名'] === u)) {
                err.textContent = 'このユーザー名は既に使用されています';
                return;
            }
            
            const childrenCount = orgData.filter(o => o['上司ID'] === bossId).length;
            if (childrenCount >= 2) {
                err.textContent = 'この上司の配下は既に満員です（最大2人まで）';
                return;
            }
            
            const maxUserId = Math.max(
                ...registrationData.map(r => {
                    const match = r['ユーザーID']?.match(/U(\d+)/);
                    return match ? parseInt(match[1]) : 0;
                }),
                0
            );
            const newUserId = `U${String(maxUserId + 1).padStart(3, '0')}`;
            
            const maxOrgId = Math.max(...orgData.map(o => parseInt(o['ID']) || 0), 0);
            const newOrgId = maxOrgId + 1;
            
            registrationData.push({
                'ユーザーID': newUserId,
                'ユーザー名': u,
                'パスワード': p,
                '権限': 'general',
                '組織ID': String(newOrgId),
                '上司ID': String(bossId)
            });
            
            orgData.push({
                'ID': String(newOrgId),
                '名前': u,
                '上司ID': String(bossId),
                'ユーザーID': newUserId
            });
            
            saveData();
            suc.textContent = `ユーザー「${u}」を登録しました。ログイン画面からログインしてください。`;
            
            document.getElementById('regUsername').value = '';
            document.getElementById('regPassword').value = '';
            document.getElementById('regBoss').value = '';
            
            populateBossDropdown();
        }
        
        function showOrgChart() {
            document.getElementById('loginScreen').classList.remove('active');
            document.getElementById('orgChartScreen').classList.add('active');
            
            const isAdmin = currentUser['権限'] === 'admin';
            document.getElementById('adminButtons').style.display = isAdmin ? 'flex' : 'none';
            document.getElementById('userLogoutBtn').style.display = isAdmin ? 'none' : 'block';
            
            document.getElementById('userInfo').textContent = `ユーザー: ${currentUser['ユーザー名']} (${currentUser['権限']})`;
            
            displayOrgChart();
        }
        
        function displayOrgChart() {
            const tree = document.getElementById('orgTree');
            tree.innerHTML = '';
            const ceos = orgData.filter(o => o['上司ID'] === '0' || !o['上司ID']);
            ceos.forEach(ceo => tree.appendChild(createTreeNode(ceo)));
        }
        
        function createTreeNode(org) {
            const node = document.createElement('div');
            node.className = 'tree-node';
            
            const box = document.createElement('div');
            box.className = 'node-box';
            
            const name = document.createElement('h3');
            name.textContent = org['名前'] || '名前なし';
            
            const id = document.createElement('p');
            id.textContent = `ID: ${org['ID']}`;
            
            const userId = document.createElement('div');
            userId.className = 'user-id';
            userId.textContent = `ユーザーID: ${org['ユーザーID'] || '-'}`;
            
            box.appendChild(name);
            box.appendChild(id);
            box.appendChild(userId);
            
            if (currentUser['権限'] === 'admin') {
                const deleteBtn = document.createElement('button');
                deleteBtn.textContent = '削除';
                deleteBtn.style.marginTop = '5px';
                deleteBtn.style.padding = '5px 10px';
                deleteBtn.style.fontSize = '11px';
                deleteBtn.onclick = () => deleteMember(org['ID']);
                box.appendChild(deleteBtn);
            }
            
            node.appendChild(box);
            
            if (currentUser['権限'] === 'general' && org['ID'] !== currentUser['組織ID']) {
                return node;
            }
            
            const subs = orgData.filter(o => o['上司ID'] === org['ID']);
            if (subs.length) {
                const childDiv = document.createElement('div');
                childDiv.className = 'node-children';
                
                subs.forEach((s, index) => {
                    const childWrapper = document.createElement('div');
                    const label = document.createElement('div');
                    label.className = 'child-label';
                    label.textContent = index === 0 ? '（左）' : '（右）';
                    childWrapper.appendChild(label);
                    childWrapper.appendChild(createTreeNode(s));
                    childDiv.appendChild(childWrapper);
                });
                
                node.appendChild(childDiv);
            }
            
            return node;
        }
        
        function openAddModal() {
            populateBossDropdown();
            document.getElementById('addMemberModal').classList.add('active');
        }
        
        function closeAddModal() {
            document.getElementById('addMemberModal').classList.remove('active');
            document.getElementById('newMemberName').value = '';
            document.getElementById('newMemberBoss').value = '';
            document.getElementById('addMemberError').textContent = '';
        }
        
        function addMember() {
            const name = document.getElementById('newMemberName').value.trim();
            const bossId = document.getElementById('newMemberBoss').value;
            const err = document.getElementById('addMemberError');
            
            err.textContent = '';
            
            if (!name || !bossId) {
                err.textContent = '全てのフィールドを入力してください';
                return;
            }
            
            const childrenCount = orgData.filter(o => o['上司ID'] === bossId).length;
            if (childrenCount >= 2) {
                err.textContent = 'このユーザーの配下は既に満員です（最大2人まで）';
                return;
            }
            
            const maxId = Math.max(...orgData.map(o => parseInt(o['ID']) || 0), 0);
            const newId = maxId + 1;
            
            orgData.push({
                'ID': String(newId),
                '名前': name,
                '上司ID': String(bossId)
            });
            
            saveData();
            closeAddModal();
            displayOrgChart();
        }
        
        function deleteMember(id) {
            if (confirm('このメンバーを削除しますか？')) {
                orgData = orgData.filter(o => o['ID'] !== id);
                saveData();
                displayOrgChart();
            }
        }
        
        function openExportModal() {
            document.getElementById('exportModal').classList.add('active');
        }
        
        function closeExportModal() {
            document.getElementById('exportModal').classList.remove('active');
        }
        
        function exportOrgData() {
            const csv = ['ID,名前,上司ID,ユーザーID', ...orgData.map(o => `${o['ID']},${o['名前']},${o['上司ID']},${o['ユーザーID'] || ''}`)].join('\n');
            downloadCSV(csv, 'orgdata.csv');
        }
        
        function exportUserData() {
            const csv = ['ユーザーID,ユーザー名,パスワード,権限,組織ID,上司ID',
                ...registrationData.map(r => `${r['ユーザーID']},${r['ユーザー名']},${r['パスワード']},${r['権限']},${r['組織ID']},${r['上司ID']}`)].join('\n');
            downloadCSV(csv, 'userdata.csv');
        }
        
        function downloadCSV(csv, filename) {
            const bom = '\uFEFF';
            const blob = new Blob([bom + csv], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = filename;
            link.click();
        }
        
        function openImportModal() {
            document.getElementById('importModal').classList.add('active');
        }
        
        function closeImportModal() {
            document.getElementById('importModal').classList.remove('active');
            document.getElementById('importFile').value = '';
            document.getElementById('importError').textContent = '';
            document.getElementById('importSuccess').textContent = '';
        }
        
        function importData() {
            const file = document.getElementById('importFile').files[0];
            if (!file) {
                document.getElementById('importError').textContent = 'ファイルを選択してください';
                return;
            }
            
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    const csv = e.target.result;
                    const lines = csv.replace('\uFEFF', '').trim().split('\n');
                    
                    if (lines[0].includes('上司ID') && !lines[0].includes('ユーザー名')) {
                        const headers = lines[0].split(',').map(h => h.trim());
                        orgData = lines.slice(1).filter(l => l.trim()).map(line => {
                            const cells = line.split(',');
                            const obj = {};
                            headers.forEach((h, i) => obj[h] = cells[i]?.trim() || '');
                            return obj;
                        });
                    } else {
                        const headers = lines[0].split(',').map(h => h.trim());
                        registrationData = lines.slice(1).filter(l => l.trim()).map(line => {
                            const cells = line.split(',');
                            const obj = {};
                            headers.forEach((h, i) => obj[h] = cells[i]?.trim() || '');
                            return obj;
                        });
                    }
                    
                    saveData();
                    document.getElementById('importSuccess').textContent = 'データをインポートしました';
                    setTimeout(() => closeImportModal(), 1500);
                    displayOrgChart();
                    populateBossDropdown();
                } catch (err) {
                    document.getElementById('importError').textContent = 'ファイルの形式が正しくありません';
                }
            };
            reader.readAsText(file, 'utf-8');
        }
        
        function logout() {
            currentUser = null;
            document.getElementById('orgChartScreen').classList.remove('active');
            document.getElementById('loginScreen').classList.add('active');
            document.getElementById('loginUsername').value = 'admin1';
            document.getElementById('loginPassword').value = 'pass123';
            document.getElementById('loginError').textContent = '';
            document.getElementById('loginTab').style.display = 'block';
            document.getElementById('registerTab').style.display = 'none';
        }
    </script>
</body>
</html>
